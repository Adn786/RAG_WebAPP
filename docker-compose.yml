services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: gunicorn -w 1 -b 0.0.0.0:5000 app:app   # <-- ADDED: force 1 worker
    ports:
      - "5000:5000"
    environment:
      - GITHUB_PAT=${GITHUB_PAT}
      - REDIS_URL=redis://redis:6379
      - FLASK_ENV=production       # keep as is, or change to development for debugging
      - PORT=5000
    volumes:
      - rag_data:/app/backend/data
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  rag_data:
